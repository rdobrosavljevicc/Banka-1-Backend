# Test konfiguracija - koristi H2 in-memory bazu
spring.datasource.url=jdbc:h2:mem:verificationtestdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.liquibase.enabled=false

server.port=0

# JWT
jwt.secret=test-secret-key-that-is-long-enough-for-hmac-256-algorithm
banka.security.id=id
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
banka.security.permit-all=/v3/api-docs/**,/swagger-ui/**

# RabbitMQ test vrednosti
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
rabbitmq.exchange=test-exchange
rabbitmq.routing-key=test.#
management.otlp.metrics.export.enabled=false
management.tracing.sampling.probability=0.0
