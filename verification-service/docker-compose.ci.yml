services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: verificationdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d verificationdb"]
      interval: 5s
      timeout: 3s
      retries: 15

  rabbitmq:
    image: rabbitmq:3
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 3s
      retries: 15

  verification-service:
    image: ci-test/verification-service:latest
    environment:
      VERIFICATION_SERVER_PORT: 8086
      VERIFICATION_DB_HOST: postgres
      VERIFICATION_DB_PORT: 5432
      VERIFICATION_DB_NAME: verificationdb
      VERIFICATION_DB_USER: postgres
      VERIFICATION_DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      NOTIFICATION_EXCHANGE: employee.events
      NOTIFICATION_ROUTING_KEY: employee.#
      JWT_SECRET: ci-test-secret-that-is-long-enough-for-hmac
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
