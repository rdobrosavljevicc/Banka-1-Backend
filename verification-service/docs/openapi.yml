openapi: 3.1.0
info:
  title: Verification Service API Documentation
  description: |
    Verification flow:
    1. Client requests verification for a sensitive operation.
    2. Service generates a 6-digit code, hashes it, and stores the session.
    3. Service publishes an event so notification-service can deliver the raw code.
    4. Client submits the code for validation.
    5. Service checks expiration, attempts, and the hashed code match.
    6. After 3 failed attempts the session becomes CANCELLED.
  version: "1.0"
servers:
  - url: http://localhost:8086
    description: Direct service access
  - url: http://localhost/api/verification
    description: API gateway access
paths:
  /generate:
    post:
      summary: Generate a verification session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Session generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          description: Invalid request
  /validate:
    post:
      summary: Validate a verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateRequest'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateResponse'
        '400':
          description: Invalid, expired, or cancelled session
        '404':
          description: Session not found
  /{sessionId}/status:
    get:
      summary: Get current verification status
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Current verification status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationStatus'
        '404':
          description: Session not found
components:
  schemas:
    GenerateRequest:
      type: object
      required:
        - clientId
        - operationType
        - relatedEntityId
      properties:
        clientId:
          type: integer
          format: int64
        operationType:
          $ref: '#/components/schemas/OperationType'
        relatedEntityId:
          type: string
    GenerateResponse:
      type: object
      required:
        - sessionId
      properties:
        sessionId:
          type: integer
          format: int64
    ValidateRequest:
      type: object
      required:
        - sessionId
        - code
      properties:
        sessionId:
          type: integer
          format: int64
        code:
          type: string
          pattern: '^\d{6}$'
    ValidateResponse:
      type: object
      required:
        - valid
        - status
        - remainingAttempts
      properties:
        valid:
          type: boolean
        status:
          $ref: '#/components/schemas/VerificationStatus'
        remainingAttempts:
          type: integer
    OperationType:
      type: string
      enum:
        - PAYMENT
        - TRANSFER
        - LIMIT_CHANGE
        - CARD_REQUEST
        - LOAN_REQUEST
    VerificationStatus:
      type: string
      enum:
        - PENDING
        - VERIFIED
        - EXPIRED
        - CANCELLED
