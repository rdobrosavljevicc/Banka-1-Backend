server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: notification-service
    static_configs:
      - targets: [localhost]
        labels:
          job: notification-service
          service: notification-service
          __path__: /var/log/services/notification/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            serviceName: serviceName
            traceId: traceId
            spanId: spanId
            correlationId: correlationId
            logger: logger
      - labels:
          level:
          serviceName:
          traceId:
          spanId:
          correlationId:
          logger:

