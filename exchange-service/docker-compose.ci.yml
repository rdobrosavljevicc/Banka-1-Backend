services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: exchange_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exchange_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  exchange-service:
    build:
      context: ..
      dockerfile: exchange-service/Dockerfile
      args:
        SERVER_PORT: 8085
    environment:
      EXCHANGE_SERVICE_HOST: 0.0.0.0
      EXCHANGE_SERVER_PORT: 8085
      EXCHANGE_DB_HOST: postgres
      EXCHANGE_DB_PORT: 5432
      EXCHANGE_DB_NAME: exchange_db
      EXCHANGE_DB_USER: postgres
      EXCHANGE_DB_PASSWORD: postgres
      JWT_SECRET: test_secret_key_at_least_32_characters_long
      TWELVE_DATA_API_KEY: ci-placeholder-key
    depends_on:
      postgres:
        condition: service_healthy
