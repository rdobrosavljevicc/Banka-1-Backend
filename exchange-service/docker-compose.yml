services:
  postgres:
    image: postgres:16
    container_name: exchange_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${EXCHANGE_DB_NAME:-exchange_db}
      POSTGRES_USER: ${EXCHANGE_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${EXCHANGE_DB_PASSWORD:-postgres}
    ports:
      - "${EXCHANGE_DB_EX_PORT:-5437}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EXCHANGE_DB_USER:-postgres} -d ${EXCHANGE_DB_NAME:-exchange_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - exchange-postgres-data:/var/lib/postgresql/data
    networks:
      - exchange-network

  exchange-service:
    build:
      context: ..
      dockerfile: exchange-service/Dockerfile
      args:
        SERVER_PORT: ${EXCHANGE_SERVER_PORT:-8085}
    container_name: exchange-service
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      EXCHANGE_SERVICE_HOST: 0.0.0.0
      EXCHANGE_SERVER_PORT: ${EXCHANGE_SERVER_PORT:-8085}
      EXCHANGE_DB_HOST: postgres
      EXCHANGE_DB_PORT: 5432
      EXCHANGE_DB_NAME: ${EXCHANGE_DB_NAME:-exchange_db}
      EXCHANGE_DB_USER: ${EXCHANGE_DB_USER:-postgres}
      EXCHANGE_DB_PASSWORD: ${EXCHANGE_DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-local_exchange_dev_secret_at_least_32_chars}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://otel-collector:4318/v1/metrics
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: exchange-service
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${EXCHANGE_SERVER_PORT:-8085}:${EXCHANGE_SERVER_PORT:-8085}"
    networks:
      - exchange-network

networks:
  exchange-network:
    driver: bridge

volumes:
  exchange-postgres-data:
