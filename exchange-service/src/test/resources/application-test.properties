spring.datasource.url=jdbc:h2:mem:exchange-service-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
jwt.secret=test_secret_key_at_least_32_characters_long
banka.security.id=id
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
banka.security.permit-all=/actuator/**,/v3/api-docs/**,/swagger-ui/**,/swagger-ui.html
management.otlp.metrics.export.enabled=false
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
spring.task.scheduling.enabled=false
exchange.rates.twelve-data-api-key=test-key
exchange.rates.margin-percentage=1.0
exchange.rates.fetch-on-startup=false
