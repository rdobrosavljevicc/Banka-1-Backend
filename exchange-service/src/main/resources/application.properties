spring.application.name=exchange-service
spring.config.import=optional:file:./exchange-service/.env[.properties],optional:file:./.env[.properties]
server.address=${EXCHANGE_SERVICE_HOST:0.0.0.0}
server.port=${EXCHANGE_SERVER_PORT:8085}

jwt.secret=${JWT_SECRET}
banka.security.issuer=banka1
banka.security.id=id
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
banka.security.permit-all=/actuator/**,/v3/api-docs/**,/v3/api-docs.yaml,/swagger-ui/**,/swagger-ui.html,/info

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
server.forward-headers-strategy=FRAMEWORK

spring.datasource.url=jdbc:postgresql://${EXCHANGE_DB_HOST:localhost}:${EXCHANGE_DB_PORT:5437}/${EXCHANGE_DB_NAME:exchange_db}
spring.datasource.username=${EXCHANGE_DB_USER:postgres}
spring.datasource.password=${EXCHANGE_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.group.readiness.include=readinessState,db
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.metrics.export.enabled=true
management.otlp.metrics.export.url=${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}

company.observability.starter.user-id-mdc-enabled=true

# External FX provider configuration.
exchange.rates.twelve-data-base-url=https://api.twelvedata.com
exchange.rates.twelve-data-api-key=${TWELVE_DATA_API_KEY:${ALPHA_VANTAGE_API_KEY:}}

# Bank margin expressed in percent.
# Example: 1.0 means 1%.
# buyingRate  = providerRate * (1 - marginPercentage / 100)
# sellingRate = providerRate * (1 + marginPercentage / 100)
exchange.rates.margin-percentage=1.0
# Commission percentage used by GET /calculate response.
exchange.rates.commission-percentage=0.70

# Scheduling and bootstrap behavior.
exchange.rates.fetch-cron=0 0 8 * * *
exchange.rates.fetch-on-startup=true
