name: CI - Java Services

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths:
      - 'company-observability-starter/**'
      - 'employee-service/**'
      - 'client-service/**'
      - 'account-service/**'
      - 'security-lib/**'
      - 'notification-service/**'
      - 'verification-service/**'
      - 'exchange-service/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'company-observability-starter/**'
      - 'employee-service/**'
      - 'client-service/**'
      - 'account-service/**'
      - 'notification-service/**'
      - 'security-lib/**'
      - 'verification-service/**'
      - 'exchange-service/**'

jobs:

  # ── Detect which services changed ────────────────────────────────────────
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Filter changed paths
        uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            company-observability-starter:
              - 'company-observability-starter/**'
            employee-service:
              - 'employee-service/**'
            client-service:
              - 'client-service/**'
            account-service:
              - 'account-service/**'
            notification-service:
              - 'notification-service/**'
            security-lib:
              - 'security-lib/**'
            verification-service:
              - 'verification-service/**'
            exchange-service:
              - 'exchange-service/**'

  # ── Build & Test ──────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (${{ matrix.service }})
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      - name: Publish shared libraries to mavenLocal
        run: |
          gradle :security-lib:publishToMavenLocal :company-observability-starter:publishToMavenLocal --no-daemon --warning-mode none --console plain

      - name: Lint
        run: |
          SERVICE="${{ matrix.service }}"
          gradle ":${SERVICE}:checkstyleMain" ":${SERVICE}:checkstyleTest" --no-daemon --warning-mode none --console plain

      - name: Build
        run: |
          SERVICE="${{ matrix.service }}"
          gradle ":${SERVICE}:build" -x test --no-daemon --warning-mode none --console plain

      - name: Test
        run: |
          SERVICE="${{ matrix.service }}"
          gradle ":${SERVICE}:test" --no-daemon --warning-mode none --console plain

      - name: Generate JaCoCo report (if available)
        if: always()
        run: |
          SERVICE="${{ matrix.service }}"
          if gradle ":${SERVICE}:tasks" --all --console plain | grep -q "jacocoTestReport"; then
            gradle ":${SERVICE}:jacocoTestReport" --no-daemon --warning-mode none --console plain
          else
            echo "No jacocoTestReport task for ${SERVICE}; skipping coverage report generation."
          fi

      - name: Publish test report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: '${{ matrix.service }}/build/test-results/test/TEST-*.xml'
          check_name: 'Test Report - ${{ matrix.service }}'

      - name: Upload test artifacts on failure
        uses: actions/upload-artifact@v4.6.2
        if: failure()
        with:
          name: test-results-${{ matrix.service }}-${{ github.run_id }}
          path: ${{ matrix.service }}/build/reports/tests/
          retention-days: 7

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: coverage-${{ matrix.service }}-${{ github.run_id }}
          path: ${{ matrix.service }}/build/reports/jacoco/test/html/
          if-no-files-found: ignore
          retention-days: 7

  # ── Validate Documentation ────────────────────────────────────────────────
  validate-docs:
    name: Validate Docs (${{ matrix.service }})
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Check for .skip-docs
        id: skip-docs
        run: |
          SERVICE="${{ matrix.service }}"
          if [ -f "$SERVICE/.skip-docs" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️  $SERVICE: documentation validation skipped (.skip-docs)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check README.md exists
        if: steps.skip-docs.outputs.skip != 'true'
        run: |
          SERVICE="${{ matrix.service }}"
          if [ ! -f "$SERVICE/README.md" ]; then
            echo "❌ $SERVICE/README.md is missing."
            echo "   Every service must have a README.md with:"
            echo "   - Docker Compose usage instructions"
            echo "   - .env / environment variable documentation"
            echo "   - Endpoint and/or event examples"
            exit 1
          fi

      - name: Check README.md required sections
        if: steps.skip-docs.outputs.skip != 'true'
        run: |
          SERVICE="${{ matrix.service }}"
          README="$SERVICE/README.md"
          FAILED=0

          grep -qi "^# " "$README" || {
            echo "❌ $SERVICE/README.md: missing top-level title."
            FAILED=1
          }
          grep -q '```' "$README" || {
            echo "❌ $SERVICE/README.md: missing example code block."
            FAILED=1
          }
          grep -qi "docker.compose\|docker compose" "$README" || {
            echo "❌ $SERVICE/README.md: missing Docker Compose instructions."
            FAILED=1
          }
          grep -qi "\.env\|environment variable" "$README" || {
            echo "❌ $SERVICE/README.md: missing .env / environment variable documentation."
            FAILED=1
          }
          grep -qi "endpoint\|event\|api" "$README" || {
            echo "❌ $SERVICE/README.md: missing endpoint or event examples."
            FAILED=1
          }

          [ "$FAILED" -eq 0 ] && echo "✅ $SERVICE/README.md contains all required sections."
          exit $FAILED

      - name: Set up Node.js for redocly
        if: steps.skip-docs.outputs.skip != 'true'
        uses: actions/setup-node@v4.3.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install redocly
        if: steps.skip-docs.outputs.skip != 'true'
        run: npm ci

      - name: Check OpenAPI spec exists or is skipped
        if: steps.skip-docs.outputs.skip != 'true'
        id: openapi-check
        run: |
          SERVICE="${{ matrix.service }}"

          if [ -f "$SERVICE/.skip-openapi" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⏭️  $SERVICE: OpenAPI validation skipped (.skip-openapi)"
            exit 0
          fi

          SPEC=""
          for PATH_CANDIDATE in \
            "$SERVICE/docs/openapi.yml" \
            "$SERVICE/docs/openapi.yaml" \
            "$SERVICE/src/main/resources/openapi.yml" \
            "$SERVICE/src/main/resources/openapi.yaml"; do
            if [ -f "$PATH_CANDIDATE" ] && [ -s "$PATH_CANDIDATE" ]; then
              SPEC="$PATH_CANDIDATE"
              break
            fi
          done

          if [ -z "$SPEC" ]; then
            echo "❌ $SERVICE: no OpenAPI spec found."
            echo "   Add one at docs/openapi.yml or src/main/resources/openapi.yml"
            echo "   If this service has no HTTP API, add a .skip-openapi file."
            exit 1
          fi

          echo "spec=$SPEC" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Validate OpenAPI spec
        if: steps.skip-docs.outputs.skip != 'true' && steps.openapi-check.outputs.skip != 'true'
        run: |
          SPEC="${{ steps.openapi-check.outputs.spec }}"
          
          grep -qi "^openapi:" "$SPEC" || {
            echo "❌ OpenAPI spec missing 'openapi:' field."
            exit 1
          }
          
          grep -qi "^info:" "$SPEC" || {
            echo "❌ OpenAPI spec missing 'info:' section."
            exit 1
          }
          
          grep -qi "^[[:space:]]*title:" "$SPEC" || {
            echo "❌ OpenAPI spec missing 'title:' field."
            exit 1
          }
          
          grep -qi "^[[:space:]]*version:" "$SPEC" || {
            echo "❌ OpenAPI spec missing 'version:' field."
            exit 1
          }
          
          grep -qi "^paths:" "$SPEC" || {
            echo "❌ OpenAPI spec missing 'paths:' section."
            exit 1
          }
          
          npx redocly lint "$SPEC"
          echo "✅ OpenAPI spec is valid."

  # ── Docker Build Validation ───────────────────────────────────────────────
  # ── Docker Build & Run Validation ─────────────────────────────────────────
  docker-validate:
    name: Docker Build & Run Validation (${{ matrix.service }})
    needs: [ detect-changes, build-and-test, validate-docs ]
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - uses: actions/checkout@v4.2.2

      # ── Check if Dockerfile exists in the service folder
      - name: Check for Dockerfile
        id: check
        run: |
          SERVICE="${{ matrix.service }}"
          if [ -f "$SERVICE/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No Dockerfile found in $SERVICE, skipping Docker validation."
          fi

      # ── Build Docker image from repo root
      - name: Build Docker image
        if: steps.check.outputs.exists == 'true'
        run: |
          SERVICE="${{ matrix.service }}"
          echo "Building Docker image for $SERVICE"
          docker build -f "$SERVICE/Dockerfile" . \
            -t "ci-test/$SERVICE:latest"

      # ── Test Docker image starts successfully
      - name: Test Docker image runs
        if: steps.check.outputs.exists == 'true'
        run: |
          SERVICE="${{ matrix.service }}"
          COMPOSE_CI="$SERVICE/docker-compose.ci.yml"

          if [ -f "$COMPOSE_CI" ]; then
            echo "Starting $SERVICE via docker-compose.ci.yml (with dependencies)"
            docker compose -f "$COMPOSE_CI" -p "ci-$SERVICE" up -d
            sleep 30

            RUNNING=$(docker compose -f "$COMPOSE_CI" -p "ci-$SERVICE" ps --status running 2>/dev/null \
              | grep -c "$SERVICE" || true)
            echo "Running containers matching $SERVICE: $RUNNING"

            if [ "$RUNNING" -lt 1 ]; then
              echo "❌ Container for $SERVICE is not running."
              docker compose -f "$COMPOSE_CI" -p "ci-$SERVICE" logs "$SERVICE" || true
              exit 1
            fi
          else
            echo "Starting container for $SERVICE"
            docker run -d --name "ci-$SERVICE" "ci-test/$SERVICE:latest"
            sleep 15

            STATUS=$(docker inspect -f '{{.State.Status}}' "ci-$SERVICE")
            echo "Container status: $STATUS"

            if [ "$STATUS" != "running" ]; then
              echo "❌ Container for $SERVICE is not running."
              docker logs "ci-$SERVICE" || true
              exit 1
            fi
          fi

          echo "✅ Docker image for $SERVICE started successfully."

      - name: Cleanup container
        if: always() && steps.check.outputs.exists == 'true'
        run: |
          SERVICE="${{ matrix.service }}"
          COMPOSE_CI="$SERVICE/docker-compose.ci.yml"

          if [ -f "$COMPOSE_CI" ]; then
            docker compose -f "$COMPOSE_CI" -p "ci-$SERVICE" down -v >/dev/null 2>&1 || true
          else
            docker rm -f "ci-$SERVICE" >/dev/null 2>&1 || true
          fi

  # ── TODO: Docker Build & Push to Registry ────────────────────────────────
  # Configure once a container registry is available.



  # ── TODO: Deploy to Dev Environment ──────────────────────────────────────
  #  Configure once the dev server and docker-compose are set up.
