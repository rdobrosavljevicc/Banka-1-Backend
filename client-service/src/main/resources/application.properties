spring.application.name=clientService
server.port=${CLIENT_SERVICE_PORT}
# Security
jwt.secret=${JWT_SECRET}
banka.security.issuer=banka1
banka.security.id=id
banka.security.roles-claim=roles
#ms
banka.security.expiration-time=3600000
banka.security.permissions-claim=permissions
banka.security.permit-all=/v3/api-docs/**,/v3/api-docs.yaml,/swagger-ui/**,/swagger-ui.html,/auth/login,/auth/check-activate,/auth/activate,/auth/reset-password,/auth/forgot-password,/auth/resend-activation,/actuator/**
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
server.forward-headers-strategy=FRAMEWORK
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
management.otlp.metrics.export.enabled=true
management.otlp.metrics.export.url=${MANAGEMENT_OTLP_METRICS_EXPORT_URL:http://localhost:4318/v1/metrics}
management.endpoint.health.show-details=never
management.endpoint.health.group.readiness.include=readinessState,db,rabbit
# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
rabbitmq.queue=${NOTIFICATION_QUEUE}
rabbitmq.exchange=${NOTIFICATION_EXCHANGE}
rabbitmq.routing-key=${NOTIFICATION_ROUTING_KEY}
# Database
spring.datasource.url=jdbc:postgresql://${CLIENT_SERVICE_DB_HOST}:${CLIENT_SERVICE_DB_PORT}/${CLIENT_SERVICE_DB_NAME}
spring.datasource.username=${CLIENT_SERVICE_DB_USER}
spring.datasource.password=${CLIENT_SERVICE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# Liquibase handles DDL, Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate
# Liquibase
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
# Rate limiting
rate-limit.max-requests=10
rate-limit.window-ms=60000
url.activate-account=${CLIENT_ACTIVATE_ACCOUNT_URL:http://localhost:3000/activate?token=}
url.reset-password=${CLIENT_RESET_PASSWORD_URL:http://localhost:3000/reset-password?token=}

token.confirmation.expiration-time=15

company.observability.starter.user-id-mdc-enabled=true
